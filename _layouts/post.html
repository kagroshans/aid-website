---
layout: default
---
<div class="post-hero">
  <div class="container">
    <h1>{{ page.title }}</h1>
    <div class="post-hero__meta">
      <span>{{ page.date | date: "%B %-d, %Y" }}</span>
      <span>{{ page.author | default: site.author }}</span>
    </div>
  </div>
</div>

<div class="post-body">
  <a href="{{ '/blog.html' | relative_url }}" class="back-link">&larr; Back to Blog</a>

  {{ content }}

  {% if page.tags.size > 0 %}
    <div class="post-tags">
      {% for tag in page.tags %}
        <span class="tag">{{ tag }}</span>
      {% endfor %}
    </div>
  {% endif %}
</div>
